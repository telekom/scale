<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>

    <script type="module" src="/build/scale-components.esm.js"></script>
    <link rel="stylesheet" href="/build/scale-components.css" />
    <style type="text/css" media="screen, print">
      html {
        margin: 0;
        padding: 0;
      }

      body {
        margin: 0;
        padding: 4rem;
      }
    </style>
  </head>

  <body>
    <p>
      <scale-checkbox
        checked
        disabled
        label="Selected Disabled"
      ></scale-checkbox>
    </p>
    <p>
      <scale-checkbox indeterminate label="Indeterminate"></scale-checkbox>
    </p>
    <p>
      <scale-checkbox
        label="Standard with error"
        helper-text="This is the error message"
        invalid
      ></scale-checkbox>
    </p>
    <p>
      <scale-switch
        label="My styles were affecting checkbox styles"
      ></scale-switch>
    </p>
    <form id="checkbox-form" style="max-width: 40rem; padding-top: 2rem">
      <h2>Form submission</h2>
      <p>
        <input
          checked
          name="native-checkbox"
          type="checkbox"
          value="on"
        />
        Native checkbox
      </p>
      <p>
        <scale-checkbox
          checked
          label="Scale checkbox"
          name="scale-checkbox"
        ></scale-checkbox>
      </p>
      <p>
        <button type="submit">Serialize form</button>
      </p>
      <pre id="checkbox-form-result" style="background: #f3f3f3; padding: 1rem"></pre>
    </form>
    <script>
      const form = document.getElementById('checkbox-form');
      const output = document.getElementById('checkbox-form-result');

      const renderFormData = () => {
        const params = new URLSearchParams(new FormData(form));
        output.textContent = params.toString();
      };

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        renderFormData();
      });

      renderFormData();
    </script>
  </body>
</html>
